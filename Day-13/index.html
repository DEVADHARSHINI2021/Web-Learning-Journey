<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Clock & Alarm</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>Digital Clock</h1>

        <div id="clock">
            00:00:00 AM
        </div>

        <div class="alarm-box">

            <h2>Set Alarm</h2>

            <input type="time" id="alarmTime">

            <button id="setAlarm">
                Set Alarm
            </button>

            <button id="clearAlarm">
                Clear Alarm
            </button>

            <p id="alarmStatus">
                No alarm set.
            </p>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
